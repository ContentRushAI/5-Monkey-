<!DOCTYPE html>

<html lang="en">
<head>

<meta
name="viewport"

<title>5 Monkey Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#F3E4D2;

font-family:Arial,sans-serif;

}

.brand-row{

display:flex;

justify-content:center;

align-items:center;

margin-bottom:10px;

}

.logo{

height:60px;

object-fit:contain;

}

.cafe-name{

font-size:36px;

font-weight:700;

}

.tagline{

font-size:20px;

}

.menu-heading{

font-size:30px;

font-weight:700;

text-align:center;

color:#4A2F20;

margin-bottom:22px;

}

.category{

display:flex;

justify-content:space-between;

align-items:center;

background:#6B4A35;

color:#FFFFFF;

padding:18px;

border-radius:12px;

margin-bottom:14px;

text-decoration:none;

}

.category-name{

font-size:26px;

font-weight:600;

}

.item-count{

font-weight:700;

}

</style>

</head>

<body>

<div class="brand-row">

<img
